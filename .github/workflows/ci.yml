name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate workstation repository
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system tooling
        run: |
          brew update
          brew install uv shellcheck

      - name: Install Python
        run: uv python install 3.13

      - name: Sync Python dependencies
        run: uv sync

      - name: Run repository checks
        run: make check

      - name: Lint shell scripts
        run: make lint-shell

      - name: Run bootstrap dry-run
        run: make bootstrap-dry-runname: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        run: brew install uv

      - name: Sync Python tooling
        run: uv sync

      - name: Validate application manifest
        run: make validate

      - name: Check shell scripts
        run: |
          brew install shellcheck
          shellcheck bootstrap.sh doctor.sh install/*.sh scripts/*.sh

      - name: Check executable scripts
        run: |
          test -x bootstrap.sh
          test -x doctor.sh
          test -x install/10-homebrew.sh
          test -x install/20-brewfile.sh
          test -x install/30-python.sh
          test -x install/40-r.sh
          test -x install/50-docker.sh
          test -x scripts/inventory.sh

